                        "name": "Yo Mama",
                        "players": "All",
                        "months": [
                                    "January",
                                    "February"
                        ],
                        "objective": "All-player lineup game. The host says a noun and actors step forward with a one-liner insult using “yo mama is a...” or “your mama is like a...” The host can ding and move to the next word after a great joke, bad joke, or missed rule."
            },
            {
                        "id": 54,
                        "name": "You Dirty Rat",
                        "players": "All",
                        "months": [
                                    "January"
                        ],
                        "objective": "All-player lineup game. The host gives nouns and actors step forward saying, “You dirty rat, they call me the _____ because _____,” explaining the nickname in a hitman-style way."
            }
];
        
        function App() {
            const games = defaultGames;
            const [currentIndex, setCurrentIndex] = useState(0);
            const [searchTerm, setSearchTerm] = useState("");
            const [filterPlayers, setFilterPlayers] = useState("");
            
            const normalize = (value) => {
                return value
                    .toString()
                    .toLowerCase()
                    .normalize('NFD')
                    .replace(/[\u0300-\u036f]/g, '')
                    .replace(/['’]/g, '')
                    .replace(/[^a-z0-9+\s]/g, ' ')
                    .replace(/\s+/g, ' ')
                    .trim();
            };
            
            const getSearchText = (game) => normalize([
                game.name,
                game.players,
                `${game.players} players`,
                ...game.months,
                game.objective
            ].join(' '));
            
            const getInitials = (text) => {
                return normalize(text)
                    .split(' ')
                    .filter(word => word.length > 0)
                    .map(word => word[0])
                    .join('');
            };

            const wordStartsWith = (text, term) => {
                return normalize(text).split(' ').some(word => word.startsWith(term));
            };
            
            const fuzzyScore = (game, rawQuery) => {
                const query = normalize(rawQuery);
                if (!query) return 1;
                
                const name = normalize(game.name);
                const objective = normalize(game.objective);
                const months = normalize(game.months.join(' '));
                const players = normalize(`${game.players} ${game.players} players`);
                const haystack = getSearchText(game);
                const initials = getInitials(game.name);
                const terms = query.split(' ').filter(Boolean);
                
                let score = 0;

                // Best match: typed characters are the beginning of the full game title.
                if (name.startsWith(query)) score += 100;

                // Strong match: typed characters match title initials, e.g. "btb" = Back to Back.
                if (query.length >= 2 && initials.startsWith(query.replace(/\s/g, ''))) score += 80;

                // Good match: typed characters are the beginning of any title word.
                if (wordStartsWith(name, query)) score += 60;

                // Multi-word lookahead: each typed word should match the beginning of a word somewhere useful.
                for (const term of terms) {
                    if (name.startsWith(term)) score += 35;
                    else if (wordStartsWith(name, term)) score += 30;
                    else if (wordStartsWith(months, term)) score += 18;
                    else if (wordStartsWith(players, term)) score += 18;
                    else if (term.length >= 3 && wordStartsWith(objective, term)) score += 8;
                    else if (term.length >= 4 && haystack.includes(term)) score += 3;
                    else return 0;
                }
                
                return score;
            };
            
            const filteredGames = useMemo(() => {
                return games
                    .map(game => ({ game, score: fuzzyScore(game, searchTerm) }))
                    .filter(({ game, score }) => {
                        const matchesSearch = score > 0;
                        const matchesPlayers = !filterPlayers || 
                            game.players.toString() === filterPlayers ||
                            (filterPlayers === "all" && game.players === "All");
                        return matchesSearch && matchesPlayers;
                    })
                    .sort((a, b) => b.score - a.score || a.game.name.localeCompare(b.game.name))
                    .map(({ game }) => game);
            }, [games, searchTerm, filterPlayers]);
            
            const currentGame = filteredGames[currentIndex];
            
            const nextCard = () => {
                if (filteredGames.length > 0) {
                    setCurrentIndex((prev) => (prev + 1) % filteredGames.length);
                }
            };
            
            const prevCard = () => {
                if (filteredGames.length > 0) {
                    setCurrentIndex((prev) => (prev - 1 + filteredGames.length) % filteredGames.length);
                }
            };
            
            return (
                <div className="container">
                    <h1>ROULETTE 2026</h1>
                    <p className="subtitle">Improv Game Reference</p>
                    
                    <input
                        type="text"
                        placeholder="Search by game, month, players, or description..."
                        className="search-box"
                        value={searchTerm}
                        onChange={(e) => {
                            setSearchTerm(e.target.value);
                            setCurrentIndex(0);
                        }}
                    />
                    
                    <div className="filters">
                        <button 
                            className={`filter-btn ${filterPlayers === '' ? 'active' : ''}`}
                            onClick={() => {
                                setFilterPlayers("");
                                setCurrentIndex(0);
                            }}
                        >
                            All
                        </button>
                        {["2", "3", "4", "5", "6", "4+"].map(p => (
                            <button 
                                key={p}
                                className={`filter-btn ${filterPlayers === p ? 'active' : ''}`}
                                onClick={() => {
                                    setFilterPlayers(p);
                                    setCurrentIndex(0);
                                }}
                            >
                                {p}
                            </button>
                        ))}
                    </div>
                    
                    {filteredGames.length > 0 && currentGame && (
                        <>
                            <div className="card">
                                <div>
                                    <h2 className="card-title">{currentGame.name}</h2>
                                    
                                    <div className="card-content">
                                        <div className="card-meta">
                                            <span>👥 Players:</span>
                                            <span>{currentGame.players}</span>
                                        </div>
                                        
                                        <div className="card-meta">
                                            <span>📅</span>
                                            <div className="months-list">
                                                {currentGame.months.map(m => (
                                                    <span key={m} className="month-tag">{m}</span>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="card-objective">
                                        {currentGame.objective}
                                    </div>
                                </div>
                                
                                <div className="card-number">
                                    Card {currentIndex + 1} of {filteredGames.length}
                                </div>
                            </div>
                            
                            <div className="nav-buttons">
                                <button 
                                    className="nav-btn"
                                    onClick={prevCard}
                                    disabled={filteredGames.length === 1}
                                >
                                    ◀
                                </button>
                                <span className="nav-counter">
                                    {currentIndex + 1} / {filteredGames.length}
                                </span>
                                <button 
                                    className="nav-btn"
                                    onClick={nextCard}
                                    disabled={filteredGames.length === 1}
                                >
                                    ▶
                                </button>
                            </div>
                            
                            {searchTerm.trim() && filteredGames.length > 1 && (
                                <div className="games-grid">
                                    {filteredGames.slice(0, 12).map((game, index) => (
                                        <button
                                            key={game.id}
                                            className="game-card"
                                            style={{ textAlign: 'left', cursor: 'pointer' }}
                                            onClick={() => setCurrentIndex(index)}
                                        >
                                            <div className="game-card-title">{game.name}</div>
                                            <div className="game-card-meta">
                                                {game.players} players • {game.months.join(', ')}
                                            </div>
                                            <div className="game-card-obj">{game.objective}</div>
                                        </button>
                                    ))}
                                </div>
                            )}
                        </>
                    )}
                    
                    {filteredGames.length === 0 && (
                        <div className="card">
                            <div>
                                <h2 className="card-title">No matches found</h2>
                                <div className="card-objective">
                                    Try a game name, player count, month, or keyword from the description.
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
