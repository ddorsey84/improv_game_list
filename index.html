<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Roulette 2026">
    <title>Roulette 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
        }
        body {
            overflow: hidden;
        }
        #root {
            width: 100%;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 1rem;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }
        .subtitle {
            color: #f87171;
            font-size: 1.125rem;
            margin-bottom: 2rem;
        }
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .tab-btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            font-size: 1rem;
            background: #1f2937;
            color: white;
            transition: all 0.3s;
        }
        .tab-btn.active {
            background: #DC2626;
        }
        .search-box {
            width: 100%;
            padding: 0.75rem 1rem;
            background: #1f2937;
            color: white;
            border: 2px solid #7f1d1d;
            border-radius: 0.5rem;
            font-size: 1rem;
            margin-bottom: 1rem;
        }
        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .filter-btn {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 0.5rem;
            background: #1f2937;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
        }
        .filter-btn.active {
            background: #DC2626;
        }
        .card {
            background: linear-gradient(to bottom right, #111827, #1f2937);
            border: 2px solid #DC2626;
            border-radius: 0.5rem;
            padding: 2rem;
            margin-bottom: 2rem;
            min-height: 24rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .card-title {
            font-size: 2rem;
            font-weight: bold;
            color: #f87171;
            margin-bottom: 1.5rem;
        }
        .card-content {
            margin-bottom: 1.5rem;
        }
        .card-meta {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-meta span {
            color: white;
        }
        .months-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .month-tag {
            background: rgba(159, 18, 18, 0.5);
            color: #fecaca;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
        }
        .card-objective {
            border-top: 1px solid #374151;
            padding-top: 1.5rem;
            color: #d1d5db;
            font-size: 1.125rem;
            line-height: 1.625;
        }
        .card-number {
            text-align: right;
            color: #6b7280;
            font-size: 0.875rem;
            margin-top: 2rem;
        }
        .nav-buttons {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .nav-btn {
            padding: 0.75rem;
            background: #DC2626;
            color: white;
            border: none;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .nav-btn:active {
            transform: scale(0.95);
        }
        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .nav-counter {
            color: #d1d5db;
            font-weight: 300;
        }
        .edit-section {
            margin-top: 2rem;
        }
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #DC2626;
            color: white;
        }
        .btn-success {
            background: #16a34a;
            color: white;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        .game-card {
            background: #1f2937;
            border: 2px solid #4b5563;
            border-radius: 0.5rem;
            padding: 1rem;
        }
        .game-card-title {
            font-size: 1.125rem;
            font-weight: bold;
            color: #f87171;
            margin-bottom: 0.5rem;
        }
        .game-card-meta {
            font-size: 0.875rem;
            color: #9ca3af;
            margin-bottom: 0.75rem;
        }
        .game-card-obj {
            font-size: 0.875rem;
            color: #d1d5db;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .btn-small {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            color: white;
        }
        .btn-small-edit {
            background: #2563eb;
        }
        .btn-small-delete {
            background: #DC2626;
        }
        .game-btns {
            display: flex;
            gap: 0.5rem;
        }
        .game-btns button {
            flex: 1;
        }
        input, textarea, select {
            padding: 0.5rem;
            background: #111827;
            color: white;
            border: 1px solid #4b5563;
            border-radius: 0.25rem;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        const defaultGames = [
            { id: 1, name: "6 Person, 2 Headed, 3 Person Game", players: 6, months: ["February"], objective: "Six players pair off into teams of three, speak one word at a time as three separate characters" },
            { id: 2, name: "Actor's Nightmare", players: 2, months: ["November", "January"], objective: "One player gets a script while the other improvises, filling in gaps" },
            { id: 3, name: "Afterlife Group Therapy", players: 5, months: ["October"], objective: "Group therapy for 4 newly dead, 1 therapist. All died differently" },
            { id: 4, name: "Ancient Prophecy", players: "Varies", months: ["February"], objective: "Draw pictograms, audience retells, players guess in 20 seconds" },
            { id: 5, name: "Back to Back Dubbing", players: 4, months: ["August", "March"], objective: "2 act silently, 2 narrate without seeing" },
            { id: 6, name: "Back to Back Switch", players: 4, months: ["May"], objective: "Switch physical or voice actors on bell ring" },
            { id: 7, name: "Ballet", players: 4, months: ["November", "May"], objective: "Use dancing to help guess Job, Location, Object" },
            { id: 8, name: "Blues Jam", players: 4, months: ["November", "May"], objective: "Sing blues verses about annoyances with other players" },
            { id: 9, name: "Boris", players: 2, months: ["March"], objective: "Good cop calls invisible bad cop to torture criminal" },
            { id: 10, name: "Campfire Stories", players: "All", months: ["October"], objective: "Players take turns telling spooky story" },
            { id: 11, name: "Change", players: 2, months: ["September"], objective: "Host dings to prompt action changes" },
            { id: 12, name: "CSI Punsylvania", players: "All", months: ["March"], objective: "Backline game of puns about a murder" },
            { id: 13, name: "Death Trigger", players: 4, months: ["February"], objective: "Say kill word to kill a player, death word kills you" },
            { id: 14, name: "Evil Twin", players: 2, months: ["September"], objective: "Evil twins tap to make counterparts do evil" },
            { id: 15, name: "Fork in the Road", players: 6, months: ["October", "February"], objective: "3 pairs start from same point, audience votes favorite" },
            { id: 16, name: "Four Square", players: 4, months: ["November", "January"], objective: "Mini scenes rotating with prompts" },
            { id: 17, name: "Goon River", players: 3, months: ["All"], objective: "3 monologues with different perspectives of one event" },
            { id: 18, name: "Hey Baby", players: "All", months: ["January", "February"], objective: "Backline game of sexy jokes" },
            { id: 19, name: "Hey Santa...", players: "All", months: ["November"], objective: "Christmas wish backline game" },
            { id: 20, name: "Hijacker", players: 4, months: ["March"], objective: "Get weapon, transportation, location. Snapper & clapper" },
            { id: 21, name: "Hydra PhD", players: "All", months: ["February"], objective: "Multi-head answers questions one word at a time" },
            { id: 22, name: "Jeopardy", players: "3+", months: ["March"], objective: "Answer-first Jeopardy with final round" },
            { id: 23, name: "LCD", players: 4, months: ["All"], objective: "Location/Career/Death pantomime telephone" },
            { id: 24, name: "Little Voice", players: 2, months: ["November", "May"], objective: "Object persuades player to achieve goal" },
            { id: 25, name: "LOTUS", players: 6, months: ["September"], objective: "3 pairs continue story at future points, 9 scenes total" },
            { id: 26, name: "Movie Critic", players: 4, months: ["November"], objective: "Explain holiday film, two act it out" },
            { id: 27, name: "Party Quirks", players: 4, months: ["All"], objective: "Host guesses quirks of party attendees" },
            { id: 28, name: "Rashomon", players: 3, months: ["September"], objective: "Scene replayed from each character's POV" },
            { id: 29, name: "Realtor", players: 3, months: ["August"], objective: "Realtor tours home, couple uses space" },
            { id: 30, name: "Ride Share", players: "All", months: ["August", "October", "January"], objective: "Driver has scenes with each passenger" },
            { id: 31, name: "Rumors", players: "All", months: ["March"], objective: "Rumor passes down and changes" },
            { id: 32, name: "Scenes from a Hat", players: "All", months: ["August", "November", "January", "February"], objective: "Act out scenes based on prompt" },
            { id: 33, name: "Seed Word", players: 6, months: ["January"], objective: "Audience votes least favorite team each round" },
            { id: 34, name: "Serenade", players: "All", months: ["May"], objective: "ADULT (18+) gets serenaded with R&B pick-up lines" },
            { id: 35, name: "Slideshow", players: "All", months: ["January"], objective: "One monologue, others pose as slideshow images" },
            { id: 36, name: "Soap Opera", players: 4, months: ["August"], objective: "Scene with twist, death, conclusion" },
            { id: 37, name: "Sounds Like a Song", players: 4, months: ["May"], objective: "Host stops scene to make players sing" },
            { id: 38, name: "Survivor", players: 4, months: ["August", "November"], objective: "One sits out, remaining fill all parts" },
            { id: 39, name: "Top That", players: 2, months: ["August", "February"], objective: "Pantomime action, other matches with new activity" },
            { id: 40, name: "Understudy", players: "4+", months: ["January"], objective: "Host substitutes or switches actors mid-scene" },
            { id: 41, name: "Voices from Heaven", players: 4, months: ["October"], objective: "Tell story of day you died" },
            { id: 42, name: "What's the Matter with Stephen?", players: 3, months: ["August", "November", "February", "March"], objective: "Guess problem, he speaks gibberish" },
            { id: 43, name: "Where Are These Chairs", players: "All", months: ["January"], objective: "Pairs rotate, ask location, do scene" },
            { id: 44, name: "Wikipedia", players: "All", months: ["January"], objective: "Give facts, others edit or hyperlink" },
            { id: 45, name: "Work Excuse", players: 3, months: ["March"], objective: "Guess why late, coworker pantomimes" },
            { id: 46, name: "Yo Mama", players: "All", months: ["January", "February"], objective: "Line-up delivers Yo Mama jokes" },
            { id: 47, name: "You Dirty Rat", players: "All", months: ["January"], objective: "Hitman-style nickname explanation" },
        ];
        
        function App() {
            const [games, setGames] = useState(() => {
                const stored = localStorage.getItem('rouletteGames');
                return stored ? JSON.parse(stored) : defaultGames;
            });
            const [currentIndex, setCurrentIndex] = useState(0);
            const [searchTerm, setSearchTerm] = useState("");
            const [filterPlayers, setFilterPlayers] = useState("");
            const [view, setView] = useState('browse');
            
            useEffect(() => {
                localStorage.setItem('rouletteGames', JSON.stringify(games));
            }, [games]);
            
            const filteredGames = useMemo(() => {
                return games.filter(game => {
                    const matchesSearch = game.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                        game.objective.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesPlayers = !filterPlayers || 
                                        game.players.toString() === filterPlayers ||
                                        (filterPlayers === "all" && game.players === "All");
                    return matchesSearch && matchesPlayers;
                });
            }, [games, searchTerm, filterPlayers]);
            
            const currentGame = filteredGames[currentIndex];
            
            const nextCard = () => {
                if (filteredGames.length > 0) {
                    setCurrentIndex((prev) => (prev + 1) % filteredGames.length);
                }
            };
            
            const prevCard = () => {
                if (filteredGames.length > 0) {
                    setCurrentIndex((prev) => (prev - 1 + filteredGames.length) % filteredGames.length);
                }
            };
            
            const deleteGame = (id) => {
                setGames(games.filter(g => g.id !== id));
            };
            
            const exportJSON = () => {
                const dataStr = JSON.stringify(games, null, 2);
                const dataBlob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(dataBlob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'roulette-games.json';
                link.click();
            };
            
            const exportCSV = () => {
                let csv = 'Name,Players,Months,Objective\n';
                games.forEach(game => {
                    csv += `"${game.name.replace(/"/g, '""')}",${game.players},"${game.months.join(', ')}","${game.objective.replace(/"/g, '""')}"\n`;
                });
                const blob = new Blob([csv], { type: 'text/csv' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = 'roulette-games.csv';
                link.click();
            };
            
            return (
                <div className="container">
                    <h1>ROULETTE 2026</h1>
                    <p className="subtitle">Improv Game Reference</p>
                    
                    <div className="tabs">
                        <button 
                            className={`tab-btn ${view === 'browse' ? 'active' : ''}`}
                            onClick={() => setView('browse')}
                        >
                            Browse
                        </button>
                        <button 
                            className={`tab-btn ${view === 'edit' ? 'active' : ''}`}
                            onClick={() => setView('edit')}
                        >
                            Edit
                        </button>
                    </div>
                    
                    {view === 'browse' && (
                        <>
                            <input
                                type="text"
                                placeholder="Search games..."
                                className="search-box"
                                value={searchTerm}
                                onChange={(e) => {
                                    setSearchTerm(e.target.value);
                                    setCurrentIndex(0);
                                }}
                            />
                            
                            <div className="filters">
                                <button 
                                    className={`filter-btn ${filterPlayers === '' ? 'active' : ''}`}
                                    onClick={() => {
                                        setFilterPlayers("");
                                        setCurrentIndex(0);
                                    }}
                                >
                                    All
                                </button>
                                {["2", "3", "4", "5", "6", "4+"].map(p => (
                                    <button 
                                        key={p}
                                        className={`filter-btn ${filterPlayers === p ? 'active' : ''}`}
                                        onClick={() => {
                                            setFilterPlayers(p);
                                            setCurrentIndex(0);
                                        }}
                                    >
                                        {p}
                                    </button>
                                ))}
                            </div>
                            
                            {filteredGames.length > 0 && currentGame && (
                                <>
                                    <div className="card">
                                        <div>
                                            <h2 className="card-title">{currentGame.name}</h2>
                                            
                                            <div className="card-content">
                                                <div className="card-meta">
                                                    <span>👥 Players:</span>
                                                    <span>{currentGame.players}</span>
                                                </div>
                                                
                                                <div className="card-meta">
                                                    <span>📅</span>
                                                    <div className="months-list">
                                                        {currentGame.months.map(m => (
                                                            <span key={m} className="month-tag">{m}</span>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="card-objective">
                                                {currentGame.objective}
                                            </div>
                                        </div>
                                        
                                        <div className="card-number">
                                            Card {currentIndex + 1} of {filteredGames.length}
                                        </div>
                                    </div>
                                    
                                    <div className="nav-buttons">
                                        <button 
                                            className="nav-btn"
                                            onClick={prevCard}
                                            disabled={filteredGames.length === 1}
                                        >
                                            ◀
                                        </button>
                                        <span className="nav-counter">
                                            {currentIndex + 1} / {filteredGames.length}
                                        </span>
                                        <button 
                                            className="nav-btn"
                                            onClick={nextCard}
                                            disabled={filteredGames.length === 1}
                                        >
                                            ▶
                                        </button>
                                    </div>
                                </>
                            )}
                        </>
                    )}
                    
                    {view === 'edit' && (
                        <div className="edit-section">
                            <div className="btn-group">
                                <button className="btn btn-success" onClick={exportJSON}>
                                    ⬇️ Export as JSON
                                </button>
                                <button className="btn btn-success" onClick={exportCSV}>
                                    ⬇️ Export as CSV
                                </button>
                            </div>
                            
                            <div className="games-grid">
                                {games.map(game => (
                                    <div key={game.id} className="game-card">
                                        <div className="game-card-title">{game.name}</div>
                                        <div className="game-card-meta">
                                            {game.players} players • {game.months.join(', ')}
                                        </div>
                                        <div className="game-card-obj">{game.objective}</div>
                                        <div className="game-btns">
                                            <button 
                                                className="btn-small btn-small-delete"
                                                onClick={() => deleteGame(game.id)}
                                            >
                                                Delete
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }
        
        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
